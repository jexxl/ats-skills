<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ATS 算法模型封面</title>

<style>
  :root {
    --basic-color: #4f64fa;
    --dedicated-color: #5c7617;
    --text-main: #111827;
    --border-strong: #94a3b8;
    --card-bg: #ffffff;
    --page-bg: #eef2f7;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 40px;
    background: var(--page-bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
  }

  .algorithm-card {
    --theme-color: var(--basic-color);
    width: min(1180px, 100%);
    aspect-ratio: 2.35 / 1;
    background: var(--card-bg);
    border-radius: 18px;
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    overflow: hidden;
    display: grid;
    grid-template-rows: 12px 1fr;
  }

  .algorithm-card.basic,
  .algorithm-card[data-type="basic"] {
    --theme-color: var(--basic-color);
  }

  .algorithm-card.dedicated,
  .algorithm-card[data-type="dedicated"] {
    --theme-color: var(--dedicated-color);
  }

  .accent-bar {
    background: var(--theme-color);
  }

  .card-content {
    padding: 28px 42px 30px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    row-gap: 22px;
    min-height: 0;
  }

  .card-header {
    display: grid;
    grid-template-columns: 108px minmax(0, 1fr);
    column-gap: 24px;
    align-items: center;
    min-height: 0;
  }

  .type-badge {
    height: 54px;
    border-radius: 10px;
    background: var(--theme-color);
    color: #ffffff;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  .algorithm-card .type-badge:empty::before {
    content: "基础";
  }

  .algorithm-card.dedicated .type-badge:empty::before,
  .algorithm-card[data-type="dedicated"] .type-badge:empty::before {
    content: "专用";
  }

  .function-text {
    min-width: 0;
    color: var(--text-main);
    font-size: 27px;
    line-height: 1.34;
    overflow-wrap: anywhere;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .function-text strong {
    font-weight: 900;
  }

  .flow-panel {
    min-width: 0;
    min-height: 0;
    border: 2px dashed var(--border-strong);
    border-radius: 16px;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .mermaid {
    width: 100%;
    height: 100%;
    margin: 0;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mermaid svg {
    width: auto !important;
    height: auto !important;
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  .card-footer {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    column-gap: 36px;
    min-height: 0;
  }

  .service-scene {
    min-width: 0;
    color: var(--text-main);
    font-size: 24px;
    line-height: 1.3;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .service-scene strong {
    font-size: 27px;
    font-weight: 900;
  }

  .language {
    max-width: 260px;
    color: var(--text-main);
    font-size: 27px;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  @media (max-width: 900px) {
    body {
      padding: 20px;
    }

    .algorithm-card {
      aspect-ratio: 2.35 / 1;
    }

    .card-content {
      padding: 22px 28px 24px;
      row-gap: 16px;
    }

    .card-header {
      grid-template-columns: 88px minmax(0, 1fr);
      column-gap: 18px;
    }

    .type-badge {
      height: 44px;
      font-size: 21px;
    }

    .function-text {
      font-size: 21px;
    }

    .flow-panel {
      padding: 4px 10px;
    }

    .service-scene {
      font-size: 19px;
    }

    .service-scene strong {
      font-size: 21px;
    }

    .language {
      max-width: 200px;
      font-size: 20px;
    }
  }
</style>
</head>

<body>
<!-- EDIT 1: data-type="basic" for J algorithms, data-type="dedicated" for Z algorithms. -->
<section class="algorithm-card" data-type="basic">
  <div class="accent-bar"></div>

  <div class="card-content">
    <div class="card-header">
      <div class="type-badge"></div>

      <!-- EDIT 2: Replace with one functional sentence. Keep one <strong>keyword</strong>. -->
      <div class="function-text">
        用一句话说明算法模型的主要功能，<strong>关键词加粗</strong>，不超过两行
      </div>
    </div>

    <div class="flow-panel">
<!-- EDIT 3: Replace Mermaid content. Keep flowchart LR at column start and use 2-6 nodes. -->
<pre class="mermaid">flowchart LR
  A["流程1"] --> B["流程2"]
  B --> C["流程3"]
  C --> D["流程4"]
</pre>
    </div>

    <div class="card-footer">
      <!-- EDIT 4: Replace service scene text after the label. -->
      <div class="service-scene">
        <strong>模型服务场景：</strong>{模型服务场景}
      </div>

      <!-- EDIT 5: Replace primary language text, such as Python or Python / C++. -->
      <div class="language">Python / C++</div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<script>
  async function renderAlgorithmCards() {
    document.querySelectorAll(".algorithm-card").forEach((card) => {
      const type =
        card.dataset.type ||
        (card.classList.contains("dedicated") ? "dedicated" : "basic");

      card.dataset.type = type;

      const badge = card.querySelector(".type-badge");
      if (badge && !badge.textContent.trim()) {
        badge.textContent = type === "dedicated" ? "专用" : "基础";
      }
    });

    if (!window.mermaid) {
      console.warn("Mermaid 未加载，流程图无法渲染。");
      return;
    }

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "base",
      flowchart: {
        curve: "linear",
        nodeSpacing: 42,
        rankSpacing: 52,
        padding: 6,
        htmlLabels: false,
        useMaxWidth: true
      },
      themeVariables: {
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif',
        fontSize: "24px",
        primaryColor: "#ffffff",
        primaryTextColor: "#111827",
        primaryBorderColor: "#cbd5e1",
        lineColor: "#94a3b8",
        secondaryColor: "#f8fafc",
        tertiaryColor: "#ffffff",
        clusterBkg: "#ffffff",
        clusterBorder: "#94a3b8",
        edgeLabelBackground: "#ffffff"
      }
    });

    await mermaid.run({
      querySelector: ".mermaid:not([data-processed='true'])"
    });
  }

  window.addEventListener("DOMContentLoaded", renderAlgorithmCards);
</script>
</body>
</html>
